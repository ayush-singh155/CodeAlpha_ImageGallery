<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <h1 class="gallery-title">Image Gallery</h1>
            <p class="header-subtitle">Discover Beautiful Moments</p>
        </div>
    </header>

    <section class="filter-section">
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="animals">Animals</button>
            <button class="filter-btn" data-filter="car">Cars</button>
        </div>
    </section>

    <section class="gallery">
        <div class="gallery-item" data-category="nature">
            <img src="./nature1.jpeg" alt="Nature scene">
            <h3 class="gallery-item-title">Green Nature</h3>
         </div>
        <div class="gallery-item" data-category="nature">
            <img src="./nature2.png" alt="Nature scene">
            <h3 class="gallery-item-title">SKY</h3>
        </div>
        <div class="gallery-item" data-category="nature">
            <img src="./nature3.png" alt="Nature scene">
            <h3 class="gallery-item-title">weather</h3>
        </div>
        <div class="gallery-item" data-category="nature">
            <img src="./nature4.png" alt="Nature scene">
            <h3 class="gallery-item-title">Night Moon🌕</h3>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="./Black Panther.png" alt="Animal scene">
            <h3 class="gallery-item-title">Black Panther</h3>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="./Lion.png" alt="Animal scene">
            <h3 class="gallery-item-title">Lion</h3>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="./Hourse.png" alt="Animal scene">
            <h3 class="gallery-item-title">Hourse</h3>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="./Tiger.png" alt="Animal scene">
            <h3 class="gallery-item-title">Tiger</h3>
        </div>
        <div class="gallery-item" data-category="animals">
            <img src="./Wolf.png" alt="Animal scene">
            <h3 class="gallery-item-title">Wolf</h3>
        </div>
        <div class="gallery-item" data-category="car">
            <img src="./car 1.jpg" alt="Car scene">
            <h3 class="gallery-item-title">Dodge Challenger SRT</h3>
        </div>
        <div class="gallery-item" data-category="car">
            <img src="./car2.png" alt="Car scene">
            <h3 class="gallery-item-title">G-Wagon</h3>
        </div>
        <div class="gallery-item" data-category="car">
            <img src="./car 3.png" alt="Car scene">
            <h3 class="gallery-item-title">Lamborghini Urus</h3>
        </div> 


    </section>

    <script src="script.js"></script>    
</body>
</html>
